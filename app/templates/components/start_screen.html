<div id="game-container">
<div class="flex flex-col min-h-full">
    <!-- Hero Section -->
    {% include "components/hero.html" %}
    
    <!-- Game Preview Board Section -->
    {% include "components/preview_board.html" %}
    
    <!-- Feature Highlights Section -->
    {% include "components/features.html" %}
    
    <!-- Sample Questions Section -->
    {% include "components/questions.html" %}
    
    <!-- Call-to-Action Section with Mode Selection -->
    <section class="landing-section animate-slide-up stagger-5 mb-12">
        <div class="relative z-10 max-w-3xl mx-auto text-center">
            <h2 class="text-3xl font-bold glow-cyan mb-8 neon-text">CHOOSE YOUR MODE</h2>
            <div class="flex flex-col md:flex-row gap-6 justify-center">
                <!-- Bingo Mode Button -->
                <button
                    hx-post="/start/bingo"
                    hx-target="#game-container"
                    hx-swap="outerHTML"
                    class="flex-1 bg-accent text-gray-100 font-bold py-4 px-8 rounded text-lg active:bg-neon-orange transition-all duration-150 animate-flashing neon-text shadow-xl hover:shadow-xl"
                    style="letter-spacing: 2px; min-width: 200px;">
                    ◆ BINGO ◆
                </button>
                <!-- Scavenger Hunt Mode Button -->
                <button
                    hx-post="/start/scavenger_hunt"
                    hx-target="#game-container"
                    hx-swap="outerHTML"
                    class="flex-1 bg-accent text-gray-100 font-bold py-4 px-8 rounded text-lg active:bg-neon-orange transition-all duration-150 animate-flashing neon-text shadow-xl hover:shadow-xl"
                    style="letter-spacing: 2px; min-width: 200px;">
                    ◆ SCAVENGER HUNT ◆
                </button>
                <!-- Card Deck Shuffle Mode Button -->
                <button
                    hx-post="/start/card_deck_shuffle"
                    hx-target="#game-container"
                    hx-swap="outerHTML"
                    class="flex-1 bg-accent text-gray-100 font-bold py-4 px-8 rounded text-lg active:bg-neon-orange transition-all duration-150 animate-flashing neon-text shadow-xl hover:shadow-xl"
                    style="letter-spacing: 2px; min-width: 200px;">
                    ◆ CARD DECK ◆
                </button>
            </div>
            <p class="text-xs glow-cyan mt-6" style="letter-spacing: 0.5px; opacity: 0.6;">
                Tap to begin. No downloads, no logins. Just pure arcade fun.
            </p>
        </div>
    </section>
</div>
</div>

<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6">
    <div class="text-center max-w-sm arcade-bezel p-8 rounded-lg">
        <h1 class="text-5xl font-bold glow-pink mb-4 neon-text animate-wobble">SOC OPS</h1>
        <p class="text-lg glow-cyan mb-8 neon-text">SOCIAL BINGO</p>

        <div class="arcade-border rounded-lg p-6 mb-8 text-left bg-gray-50">
            <h2 class="font-bold text-neon-cyan mb-3 text-center neon-text">HOW TO PLAY:</h2>
            <ul class="text-sm space-y-2 text-gray-700">
                <li class="glow-cyan">• Find people who match</li>
                <li class="glow-cyan">• Tap square when found</li>
                <li class="glow-cyan">• Get 5 in a row = WIN!</li>
            </ul>
        </div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full bg-accent text-gray-100 font-bold py-4 px-8 rounded text-lg active:bg-neon-orange transition-all duration-150 animate-flashing neon-text">
            ▶ START GAME ◀
        </button>
    </div>
</div>
</div>

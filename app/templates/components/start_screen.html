<div id="game-container">
<div class="flex flex-col min-h-full">
    <!-- Hero Section -->
    {% include "components/hero.html" %}
    
    <!-- Game Preview Board Section -->
    {% include "components/preview_board.html" %}
    
    <!-- Feature Highlights Section -->
    {% include "components/features.html" %}
    
    <!-- Sample Questions Section -->
    {% include "components/questions.html" %}
    
    <!-- Call-to-Action Section -->
    <section class="landing-section animate-slide-up stagger-5 mb-12">
        <div class="relative z-10 max-w-2xl mx-auto text-center">
            <button
                hx-post="/start"
                hx-target="#game-container"
                hx-swap="outerHTML"
                class="w-full md:w-auto bg-accent text-gray-100 font-bold py-4 px-12 rounded text-xl active:bg-neon-orange transition-all duration-150 animate-flashing neon-text shadow-xl hover:shadow-xl"
                style="letter-spacing: 2px; min-width: 300px;">
                ▶ START GAME ◀
            </button>
            <p class="text-xs glow-cyan mt-6" style="letter-spacing: 0.5px; opacity: 0.6;">
                Tap to begin. No downloads, no logins. Just pure arcade fun.
            </p>
        </div>
    </section>
</div>
</div>

<div id="game-container">
<div class="flex flex-col min-h-full">
    <!-- Header -->
    <header class="flex items-center justify-between p-3 arcade-border rounded-t-lg border-b border-gray-300">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="text-neon-cyan text-sm px-3 py-1.5 rounded neon-text font-bold hover:glow-cyan transition-all">
            ◀ BACK
        </button>
        <h1 class="font-bold glow-pink neon-text text-lg">SOC OPS</h1>
        <div class="w-16"></div>
    </header>

    <!-- Instructions -->
    <p class="text-center glow-cyan text-sm py-2 px-4 neon-text">
        TAP SQUARE WHEN FOUND
    </p>

    <!-- Bingo indicator -->
    {% if session.has_bingo %}
    <div class="bg-amber-100 text-neon-pink text-center py-2 font-bold text-sm animate-flashing neon-text">
        🎉 BINGO! LINE FOUND!
    </div>
    {% endif %}

    <!-- Board -->
    <div class="flex-1 flex items-center justify-center p-3 arcade-border rounded-b-lg m-2">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>

<div id="game-container">
<div class="flex flex-col min-h-full">
    <!-- Header -->
    <header class="flex items-center justify-between p-3 arcade-border rounded-t-lg border-b border-gray-300">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="text-neon-cyan text-sm px-3 py-1.5 rounded neon-text font-bold hover:glow-cyan transition-all">
            ◀ BACK
        </button>
        <h1 class="font-bold glow-pink neon-text text-lg">SCAVENGER HUNT</h1>
        <div class="w-16"></div>
    </header>

    <!-- Instructions -->
    <p class="text-center glow-cyan text-sm py-2 px-4 neon-text">
        FIND PEOPLE WHO MATCH AND CHECK THEM OFF
    </p>

    <!-- Progress Meter -->
    <div class="px-4 pt-4">
        {% set marked, total = session.get_scavenger_progress() %}
        {% include "components/progress_meter.html" %}
    </div>

    <!-- Items List -->
    <div class="flex-1 overflow-y-auto p-4">
        <div class="grid gap-3">
            {% for item in session.scavenger_items %}
            <button
                hx-post="/toggle/{{ item.id }}"
                hx-target="#game-container"
                hx-swap="outerHTML"
                class="arcade-card arcade-border p-4 rounded text-left transition-all duration-200 hover:shadow-xl
                    {% if item.is_marked %}arcade-card-marked{% endif %}"
                style="display: flex; align-items: center; gap: 1rem; cursor: pointer;">
                <!-- Checkbox -->
                <div style="flex-shrink: 0; width: 24px; height: 24px; border: 2px solid var(--neon-{% if item.is_marked %}lime{% else %}cyan{% endif %}); border-radius: 4px; display: flex; align-items: center; justify-content: center; background-color: {% if item.is_marked %}rgba(0, 255, 0, 0.15){% else %}var(--arcade-dark-2){% endif %}; box-shadow: 0 0 {% if item.is_marked %}15{% else %}8{% endif %}px var(--neon-{% if item.is_marked %}lime{% else %}cyan{% endif %});">
                    {% if item.is_marked %}
                    <span style="color: var(--neon-lime); font-weight: bold; font-size: 16px;">✓</span>
                    {% endif %}
                </div>
                <!-- Text -->
                <span class="{% if item.is_marked %}glow-lime{% else %}glow-cyan{% endif %} neon-text text-sm flex-1" style="text-align: left;">
                    {{ item.text }}
                </span>
            </button>
            {% endfor %}
        </div>
    </div>
</div>
</div>
